; ===========================================================================
; CONFIGURACAO DE EMAIL
; ===========================================================================
;
; PARA GMAIL (recomendado):
;   1. Acesse: https://myaccount.google.com/security
;   2. Ative "Verificacao em duas etapas" (obrigatorio)
;   3. Va em "Senhas de app" -> selecione "Mail" -> gere a senha
;   4. A senha gerada tem 16 caracteres (ex: abcd efgh ijkl mnop)
;   5. Cole a senha SEM espacos no campo EMAIL_SENHA abaixo
;   6. Use seu email normal no campo EMAIL_USUARIO
;
; PARA OUTLOOK/HOTMAIL:
;   SERVIDOR_IMAP = imap-mail.outlook.com
;   PORTA_IMAP = 993
;   Use seu email e senha normais (ou senha de app se MFA ativo)
;
; PARA YAHOO:
;   SERVIDOR_IMAP = imap.mail.yahoo.com
;   PORTA_IMAP = 993
;   Gere senha de app em: Conta Yahoo -> Seguranca -> Senha do app
;
; SE NAO QUISER USAR EMAIL: deixe os campos vazios - o sistema funciona sem email.
; ===========================================================================

